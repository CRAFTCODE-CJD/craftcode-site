# ══════════════════════════════════════════════════════
# CraftCode site — plugin manifest auto-updater
# ══════════════════════════════════════════════════════
# Updates manifest.json on this repo:
#   · on release publish → bump `version` from tag (strips leading `v`)
#   · on push to main    → refresh `updated` timestamp
# Commits back to main via github-actions[bot].
# ──────────────────────────────────────────────────────
name: craftcode-manifest

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'manifest.json'
      - '.github/workflows/manifest.yml'
  workflow_dispatch:

concurrency:
  group: manifest-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current manifest
        id: read
        run: |
          if [ ! -f manifest.json ]; then
            echo "manifest.json is missing — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Derive version
        id: ver
        if: steps.read.outputs.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW="${{ github.event.release.tag_name }}"
            # Strip leading `v` / `V` if present.
            VER="${RAW#v}"
            VER="${VER#V}"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Update manifest.json
        if: steps.read.outputs.skip != 'true'
        run: |
          set -e
          UPDATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VER="${{ steps.ver.outputs.version }}"
          # jq keeps the file stable; always refresh `updated`, only bump
          # `version` if we have one from the release tag.
          if [ -n "$VER" ]; then
            jq --arg v "$VER" --arg u "$UPDATED" \
              '.version = $v | .updated = $u' manifest.json > manifest.tmp.json
          else
            jq --arg u "$UPDATED" \
              '.updated = $u' manifest.json > manifest.tmp.json
          fi
          mv manifest.tmp.json manifest.json

      - name: Commit if changed
        if: steps.read.outputs.skip != 'true'
        run: |
          if git diff --quiet -- manifest.json; then
            echo "No manifest changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore(manifest): bump version/updated [skip ci]"
          git push
